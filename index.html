<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZA SLICE | Artisanal Pizza</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">PIZZA <span>SLICE</span></div>
        <ul>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#about">Our Story</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>완벽한 한 조각,<br>진정한 장인의 손맛.</h1>
            <p>신선한 유기농 재료와 전통적인 방식으로 굽는 프리미엄 나폴리 피자를 경험하세요.</p>
            <a href="#menu" class="btn-primary">메뉴 확인하기</a>
        </div>
        <div class="hero-image">
            <img src="hero.png" alt="Artisan Pizza">
        </div>
    </header>

    <section id="menu" class="menu-section">
        <div class="container">
            <h2 class="section-title">Chef's Signature</h2>
            <div class="menu-grid">
                <div class="menu-card">
                    <div class="card-img">
                        <img src="menu.png" alt="Menu Grid">
                    </div>
                    <div class="card-info">
                        <h3>프리미엄 피자 컬렉션</h3>
                        <p>페퍼로니, 콰트로 치즈, 베이직 가든-프레시 피자까지 최적의 조합을 만나보세요.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 PIZZA SLICE. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
